<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>افسانه‌ها</title>
  <link rel="icon" href="assets/img/favicon.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="assets/img/logo-amber.png" alt="افسانه‌ها">
        <span data-i18n="site">افسانه‌ها</span>
      </a>
      <div class="spacer"></div>
      <button class="btn" id="langBtn">EN</button>
      <button class="btn" id="themeBtn" title="theme">◐</button>
    </div>
  </header>

  <main class="container">
    <h1 data-i18n="contributeTitle" style="margin-top:30px">ثبت یک افسانه‌ی محلی</h1>
    <form class="form" id="legendForm">
      <label data-i18n="fFa">عنوان افسانه (فارسی)</label>
      <input name="title_fa" required maxlength="140">
      <label data-i18n="fBody">متن افسانه (فارسی)</label>
      <textarea name="body_fa" required maxlength="20000"></textarea>
      <div class="row">
        <div><label data-i18n="fProvince">استان</label><input name="province" required></div>
        <div><label data-i18n="fCity">شهر یا روستا</label><input name="city"></div>
      </div>
      <div class="row">
        <div><label data-i18n="fDialect">لهجه</label><input name="dialect"></div>
        <div><label data-i18n="fCreature">نوع موجود/دسته</label><input name="creature"></div>
      </div>
      <label data-i18n="fAuthor">نام شما (نمایش داده می‌شود)</label>
      <input name="author" required maxlength="80">
      <label data-i18n="fEmail">ایمیل (اختیاری)</label>
      <input name="email" type="email">
      <details style="margin-top:16px">
        <summary style="cursor:pointer">English version (optional)</summary>
        <label data-i18n="fEnTitle">عنوان انگلیسی</label>
        <input name="title_en" maxlength="140">
        <label data-i18n="fEnBody">متن انگلیسی</label>
        <textarea name="body_en" maxlength="20000"></textarea>
      </details>
      <!-- Cloudflare Turnstile widget goes here (see worker/README) -->
      <div class="cf-turnstile" data-sitekey=""></div>
      <div style="margin-top:20px"><button class="btn primary" type="submit" id="submitBtn" data-i18n="submit">ارسال برای بازبینی</button></div>
      <div id="formMsg" class="notice" style="display:none"></div>
    </form>
  </main>

  <footer class="site-footer"><div class="container footer-inner"><span data-i18n="footer"></span></div></footer>
  <script type="module" src="assets/js/contribute.js"></script>
</body>
</html>
