<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ثبت افسانه‌ی جدید — افسانه‌ها</title>
<meta name="description" content="ثبت افسانه‌ی محلی جدید">
<link rel="icon" href="assets/img/favicon.png">
<link rel="manifest" href="manifest.webmanifest"><meta name="theme-color" content="#2a0e1f">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="site-header"><div class="container header-inner">
  <a class="brand" href="index.html"><img class="brand-logo" src="assets/img/logo-amber.png" alt="افسانه‌ها"><span data-i18n="site">افسانه‌ها</span></a>
  <div class="spacer"></div>
  <a class="btn" href="about.html" data-i18n="about">درباره</a>
  <button class="btn" id="langBtn">EN</button><button class="btn" id="themeBtn" title="theme">◐</button>
</div></header>
<main class="container">
  <h1 data-i18n="contributeTitle">ثبت افسانه‌ی جدید</h1>
  <p style="color:var(--muted)" data-i18n="contributeIntro"></p>
  <form id="contribForm" class="contrib-form">
    <label><span data-i18n="fTitle">عنوان</span><input name="title" required></label>
    <label><span data-i18n="fProvince">استان</span><input name="province" required></label>
    <label><span data-i18n="fCity">شهر/روستا</span><input name="city"></label>
    <label><span data-i18n="fDialect">لهجه</span><input name="dialect"></label>
    <label><span data-i18n="fCreature">موجود/دسته</span><input name="creature"></label>
    <label><span data-i18n="fAuthor">نام نویسنده</span><input name="author" required></label>
    <label><span data-i18n="fCoords">مختصات (lat, lon)</span><input name="coordinates" placeholder="35.70, 51.42"></label>
    <label class="full"><span data-i18n="fBody">متن افسانه</span><textarea name="body" rows="10" required></textarea></label>
    <div class="full"><button class="btn primary" type="submit" data-i18n="fSubmit">ارسال</button></div>
  </form>
  <div id="contribResult" class="notice" style="display:none"></div>
</main>
<footer class="site-footer"><div class="container footer-inner"><span data-i18n="footer"></span></div></footer>
<script type="module" src="assets/js/contribute.js"></script>
<script src="assets/js/nav.js" defer></script>
</body>
</html>
