# بیلد و انتشار خودکار روی GitHub Pages
# 1) فهرست افسانه‌ها (assets/data/legends.json) را از روی پوشه‌ی legends/ می‌سازد
# 2) کل سایت را بدون بیلدِ پیچیده منتشر می‌کند (سایت ایستاتیک خالص)
#
# نکته: اگر نمی‌خواهی از Actions استفاده کنی، می‌توانی در Settings > Pages
# مستقیماً از شاخه‌ی main منتشر کنی (فایل .nojekyll و legends.json از قبل آماده‌اند).
name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build legends index
        run: node scripts/build-index.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
